<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 2rem;
    }
    button {
      background-color: #00bcd4;
      border: none;
      padding: 0.8rem 1.6rem;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background-color: #0097a7;
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <h1>Nexus AI</h1>
  <p>Your intelligent companion powered by Groq — fast, smart, and evolving.</p>
  <button onclick="startNexus()">Launch Chat</button>

  <footer>© 2026 Adonis — Licensed under the Boost Software License 1.0</footer>

  <script>
    function startNexus() {
      alert("Nexus AI is initializing...");
      // Later, you’ll connect this to your Groq API logic in script.js
    }
  </script>
</body>
</html>
